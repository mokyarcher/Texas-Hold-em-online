<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .logo p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab:hover {
            color: white;
        }

        .tab.active {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(0,0,0,0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4a 100%);
            color: #1a1a2e;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .btn-guest {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-guest:hover {
            background: rgba(255,255,255,0.2);
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🃏 德州扑克</h1>
            <p>Texas Hold'em Poker</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="loading" class="loading">处理中...</div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
        </form>

        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" required placeholder="4-20位字母数字">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="regNickname" placeholder="选填，默认使用用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" required placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="regConfirmPassword" required placeholder="再次输入密码">
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
        </form>

        <button class="btn btn-guest" onclick="guestLogin()">🎮 游客登录</button>
    </div>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;

        // 检查是否已登录
        const token = localStorage.getItem('poker_token');
        if (token) {
            window.location.href = 'lobby.html';
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            document.getElementById('errorMsg').textContent = '';
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            await handleLogin(username, password);
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6个字符');
                return;
            }

            await handleRegister(username, password, nickname);
        });

        async function handleLogin(username, password) {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('poker_token', data.token);
                    localStorage.setItem('poker_user', JSON.stringify(data.user));
                    window.location.href = 'lobby.html';
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查服务器是否运行');
                console.error('Login error:', error);
            }
            showLoading(false);
        }

        async function handleRegister(username, password, nickname) {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('poker_token', data.token);
                    localStorage.setItem('poker_user', JSON.stringify(data.user));
                    window.location.href = 'lobby.html';
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (error) {
                showError('网络错误，请检查服务器是否运行');
                console.error('Register error:', error);
            }
            showLoading(false);
        }

        async function guestLogin() {
            const guestName = '游客' + Math.floor(Math.random() * 10000);
            const guestPass = 'guest' + Date.now();
            
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: guestName, 
                        password: guestPass,
                        nickname: guestName 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('poker_token', data.token);
                    localStorage.setItem('poker_user', JSON.stringify(data.user));
                    localStorage.setItem('is_guest', 'true');
                    window.location.href = 'lobby.html';
                } else {
                    showError(data.error || '游客登录失败');
                }
            } catch (error) {
                showError('网络错误，请检查服务器是否运行');
                console.error('Guest login error:', error);
            }
            showLoading(false);
        }
    </script>
</body>
</html>
