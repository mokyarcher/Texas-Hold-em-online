<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州扑克 - 游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a3d2a 0%, #0d2818 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            color: #ffd700;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chips {
            color: #ffd700;
            font-weight: bold;
        }

        .btn-profile {
            padding: 8px 20px;
            background: rgba(52, 152, 219, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-profile:hover {
            background: rgba(52, 152, 219, 1);
        }

        .btn-logout {
            padding: 8px 20px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(231, 76, 60, 1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-primary {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-admin {
            padding: 15px 30px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .btn-rank {
            padding: 15px 30px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-rank:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.4);
        }

        .room-list {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .room-list-header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 170px;
            gap: 10px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
        }

        .room-item {
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 170px;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .room-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .room-name {
            font-weight: 600;
        }

        .room-host {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .btn-join {
            padding: 8px 20px;
            background: #27ae60;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-join:hover {
            background: #2ecc71;
        }

        .btn-join:disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
        }

        .btn-delete {
            padding: 8px 20px;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            min-width: 80px;
        }

        .btn-delete:hover {
            background: #c0392b;
        }
        
        .btn-join {
            min-width: 80px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        /* 创建房间弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.95), rgba(10,10,10,0.98));
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }

        .form-group select {
            background-color: #1a1a1a;
            cursor: pointer;
        }

        .form-group select option {
            background-color: #1a1a1a;
            color: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ffd700;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .password-input {
            display: none;
        }

        .password-input.show {
            display: block;
        }
        
        .room-item.playing {
            background: rgba(255, 215, 0, 0.1);
            border-left: 4px solid #ffd700;
        }
        
        .room-item.playing:hover {
            background: rgba(255, 215, 0, 0.15);
        }

        /* 后台管理弹窗样式 */
        .admin-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px;
            border-radius: 12px;
            width: 800px;
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .admin-header {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #e74c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .admin-section-title {
            font-size: 1.1rem;
            color: #ffd700;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 150px;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }

        .user-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .user-name {
            font-weight: 500;
        }

        .user-chips {
            color: #ffd700;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-edit:hover {
            background: #2980b9;
        }

        .btn-delete-small {
            background: #e74c3c;
            color: white;
        }

        .btn-delete-small:hover {
            background: #c0392b;
        }

        .btn-danger {
            padding: 12px 25px;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .chips-input {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .chips-input input, .chips-input select {
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            color: white;
        }

        .chips-input input {
            width: 100px;
        }

        .btn-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-close:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 排行榜弹窗样式 */
        .leaderboard-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .leaderboard-header {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #f39c12;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            transition: all 0.3s;
            gap: 15px;
        }

        .leaderboard-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .leaderboard-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .leaderboard-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .leaderboard-item:hover {
            background: rgba(255,255,255,0.06);
        }

        .leaderboard-item.current-user {
            background: rgba(243, 156, 18, 0.15);
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }

        .rank-1 { color: #ffd700; } /* 金牌 */
        .rank-2 { color: #c0c0c0; } /* 银牌 */
        .rank-3 { color: #cd7f32; } /* 铜牌 */
        .rank-other { color: rgba(255,255,255,0.5); }

        .leaderboard-user-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
        }

        .leaderboard-username {
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        /* 前三名渐变色名字 */
        .leaderboard-username.rank-1-name {
            background: linear-gradient(135deg, #e74c3c, #c0392b, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        .leaderboard-username.rank-2-name {
            background: linear-gradient(135deg, #9b59b6, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.15rem;
        }

        .leaderboard-username.rank-3-name {
            background: linear-gradient(135deg, #3498db, #2980b9, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .leaderboard-user-tag {
            font-size: 0.7rem;
            color: #f39c12;
            margin-left: 4px;
        }

        .leaderboard-status {
            font-size: 0.75rem;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .leaderboard-status.online {
            color: #27ae60;
        }

        .leaderboard-status.in_room {
            color: #f39c12;
        }

        .leaderboard-status.in_game {
            color: #e74c3c;
        }

        .leaderboard-status.offline {
            color: rgba(255,255,255,0.4);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: #27ae60;
            box-shadow: 0 0 4px #27ae60;
        }

        .status-dot.in_room {
            background: #f39c12;
            box-shadow: 0 0 4px #f39c12;
        }

        .status-dot.in_game {
            background: #e74c3c;
            box-shadow: 0 0 4px #e74c3c;
        }

        .status-dot.offline {
            background: rgba(255,255,255,0.3);
        }

        .leaderboard-chips {
            text-align: right;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffd700;
            white-space: nowrap;
            flex-shrink: 0;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .leaderboard-empty {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }

        /* 个人信息弹窗样式 - 横屏左右分栏 */
        .profile-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 20px;
            border-radius: 12px;
            width: 700px;
            max-width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-header {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .profile-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .profile-left, .profile-right {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
        }

        .profile-section-title {
            font-size: 1rem;
            color: #ffd700;
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .avatar-option:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
            transform: scale(1.15);
        }

        .avatar-section {
            margin-bottom: 20px;
        }

        .avatar-section-title {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .profile-info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .profile-info-item:last-child {
            border-bottom: none;
        }

        .profile-info-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .profile-info-value {
            color: white;
            font-weight: 500;
        }

        .profile-info-value.chips {
            color: #ffd700;
            font-size: 1.1rem;
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .profile-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .profile-input-group label {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }

        .profile-input-group input {
            padding: 10px 12px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
        }

        .profile-input-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .profile-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        .btn-profile-action {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-save {
            background: #27ae60;
            color: white;
        }

        .btn-save:hover {
            background: #2ecc71;
        }

        .profile-message {
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
            display: none;
        }

        .profile-message.success {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        .profile-message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        @media (max-width: 768px) {
            .profile-body {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== 自定义弹窗样式 ==================== */
        .custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .custom-dialog-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .custom-dialog {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 350px;
            max-width: 450px;
            padding: 25px;
            transform: scale(0.9);
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .custom-dialog-overlay.show .custom-dialog {
            transform: scale(1);
        }

        .custom-dialog-title {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .custom-dialog-content {
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .custom-dialog-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .custom-dialog-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .custom-dialog-btn:hover {
            transform: translateY(-2px);
        }

        .custom-dialog-btn.confirm {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .custom-dialog-btn.cancel {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .custom-dialog-btn.ok {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .custom-dialog-btn.danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        /* 不同类型的弹窗图标颜色 */
        .custom-dialog-title.info { color: #3498db; }
        .custom-dialog-title.success { color: #27ae60; }
        .custom-dialog-title.warning { color: #f39c12; }
        .custom-dialog-title.error { color: #e74c3c; }
        .custom-dialog-title.confirm { color: #ffd700; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">♠ 贵州扑克</div>
        <div class="user-info">
            <div class="user-avatar" id="headerAvatar">
                <img id="headerAvatarImg" src="" alt="头像">
            </div>

                <span class="chips">⭐ <span id="chips">0</span></span>

    <div class="container">

        <div class="room-list">

    <!-- 创建房间弹窗 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">创建房间</div>
            <form id="createRoomForm">
                <div class="form-group">
                    <label>房间名称</label>
                    <input type="text" id="roomName" placeholder="输入房间名称" required>
                </div>
                <div class="form-group">
                    <label>最大人数</label>
                    <select id="maxPlayers">
                        <option value="2">2人</option>
                        <option value="3">3人</option>
                        <option value="4">4人</option>
                        <option value="5">5人</option>
                        <option value="6" selected>6人</option>
                        <option value="7">7人</option>
                        <option value="8">8人</option>
                        <option value="9">9人</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>盲注设置</label>
                    <select id="blindSetting">
                        <option value="5,10">小盲 5 / 大盲 10</option>
                        <option value="10,20" selected>小盲 10 / 大盲 20</option>
                        <option value="25,50">小盲 25 / 大盲 50</option>
                        <option value="50,100">小盲 50 / 大盲 100</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="hasPassword" onchange="togglePassword()"> 设置密码
                    </label>
                </div>
                <div class="form-group password-input" id="passwordGroup">
                    <label>房间密码</label>
                    <input type="password" id="roomPassword" placeholder="输入密码">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="hideCreateModal()">取消</button>
                    <button type="submit" class="btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 加入房间弹窗 -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <div class="modal-header">加入房间</div>
            <form id="joinRoomForm">
                <div class="form-group">
                    <label>房间密码</label>
                    <input type="password" id="joinPassword" placeholder="如无密码请留空">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="hideJoinModal()">取消</button>
                    <button type="submit" class="btn-primary">加入</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div class="modal" id="leaderboardModal">
        <div class="leaderboard-modal-content">
            <div class="leaderboard-header">
                <span>🏆 积分排行榜</span>
                <button class="btn-close" onclick="hideLeaderboardModal()">关闭</button>
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <div class="leaderboard-empty">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 后台管理弹窗 -->
    <div class="modal" id="adminModal">
        <div class="admin-modal-content">
            <div class="admin-header">
                <span>⚙️ 后台管理</span>
                <button class="btn-close" onclick="hideAdminModal()">关闭</button>
            </div>
            
            <!-- 用户管理 -->
            <div class="admin-section">
                <div class="admin-section-title">👥 用户管理</div>
                <div class="user-list" id="adminUserList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <!-- 房间管理 -->
            <div class="admin-section">
                <div class="admin-section-title">🏠 房间管理</div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span>一键清除所有房间（危险操作）</span>
                    <button class="btn-danger" onclick="clearAllRooms()">🗑️ 清除所有房间</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div class="modal" id="profileModal">
        <div class="profile-modal-content">
            <div class="profile-header">
                <span>👤 个人信息</span>
                <button class="btn-close" onclick="hideProfileModal()">关闭</button>
            </div>
            
            <div class="profile-body">
                <!-- 左侧：信息显示 -->
                <div class="profile-left">
                    <div class="profile-section-title">📋 我的信息</div>
                    <div class="profile-avatar" id="profileAvatar">
                        <img id="profileAvatarImg" src="" alt="头像">
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">用户名</span>
                        <span class="profile-info-value" id="profileUsername">加载中...</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">昵称</span>
                        <span class="profile-info-value" id="profileNickname">加载中...</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">当前筹码</span>
                        <span class="profile-info-value chips">⭐ <span id="profileChips">0</span></span>
                    </div>
                </div>

                <!-- 右侧：修改功能 -->
                <div class="profile-right">
                    <!-- 修改头像 -->
                    <div class="avatar-section">
                        <div class="profile-section-title">🎭 修改头像</div>
                        <div class="avatar-grid" id="avatarGrid"></div>
                        <button class="btn-profile-action btn-save" style="margin-top: 15px;" onclick="updateAvatar()">保存头像</button>
                        <div class="profile-message" id="avatarMessage"></div>
                    </div>

                    <div class="profile-divider"></div>

                    <!-- 修改昵称 -->
                    <div class="profile-section-title">✏️ 修改昵称</div>
                    <div class="profile-form">
                        <div class="profile-input-group">
                            <label>新昵称</label>
                            <input type="text" id="newNickname" placeholder="输入新昵称" maxlength="20">
                        </div>
                        <button class="btn-profile-action btn-save" onclick="updateNickname()">保存昵称</button>
                        <div class="profile-message" id="nicknameMessage"></div>
                    </div>

                    <div class="profile-divider"></div>

                    <!-- 修改密码 -->
                    <div class="profile-section-title">🔒 修改密码</div>
                    <div class="profile-form">
                        <div class="profile-input-group">
                            <label>当前密码</label>
                            <input type="password" id="currentPassword" placeholder="输入当前密码">
                        </div>
                        <div class="profile-input-group">
                            <label>新密码</label>
                            <input type="password" id="newPassword" placeholder="至少6位">
                        </div>
                        <div class="profile-input-group">
                            <label>确认密码</label>
                            <input type="password" id="confirmPassword" placeholder="再次输入">
                        </div>
                        <button class="btn-profile-action btn-save" onclick="updatePassword()">修改密码</button>
                        <div class="profile-message" id="passwordMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义弹窗组件 -->
    <div class="custom-dialog-overlay" id="customDialog">
        <div class="custom-dialog">
            <div class="custom-dialog-title" id="customDialogTitle">提示</div>
            <div class="custom-dialog-content" id="customDialogContent"></div>
            <div class="custom-dialog-buttons" id="customDialogButtons"></div>
        </div>
    </div>

    <!-- 修改筹码弹窗 -->
    <div class="modal" id="chipsModal">
        <div class="modal-content">
            <div class="modal-header">⭐ 修改用户筹码</div>
            <div id="chipsModalUserInfo" style="margin-bottom: 15px; color: rgba(255,255,255,0.8);"></div>
            <div class="form-group">
                <label>操作类型</label>
                <select id="chipsOperation">
                    <option value="add">增加筹码</option>
                    <option value="subtract">减少筹码</option>
                    <option value="set">设置为</option>
                </select>
            </div>
            <div class="form-group">
                <label>金额</label>
                <input type="number" id="chipsAmount" placeholder="输入金额" min="0">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="hideChipsModal()">取消</button>
                <button type="button" class="btn-primary" onclick="saveChips()">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        let currentRoomId = null;

        // ==================== 自定义弹窗函数 ====================
        
        /**
         * 显示提示弹窗（替代 alert）
         * @param {string} message - 提示内容
         * @param {string} type - 类型: info/success/warning/error
         * @param {string} title - 标题（可选）
         */
        function showAlert(message, type = 'info', title = null) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('customDialog');
                const titleEl = document.getElementById('customDialogTitle');
                const contentEl = document.getElementById('customDialogContent');
                const buttonsEl = document.getElementById('customDialogButtons');

                // 设置标题
                const titles = {
                    info: 'ℹ️ 提示',
                    success: '✅ 成功',
                    warning: '⚠️ 警告',
                    error: '❌ 错误'
                };
                titleEl.textContent = title || titles[type] || '提示';
                titleEl.className = 'custom-dialog-title ' + type;

                // 设置内容
                contentEl.textContent = message;

                // 设置按钮
                buttonsEl.innerHTML = `
                    <button class="custom-dialog-btn ok" onclick="closeCustomDialog(true)">确定</button>
                `;

                // 保存回调
                window.customDialogCallback = resolve;

                // 显示弹窗
                dialog.classList.add('show');
            });
        }

        /**
         * 显示确认弹窗（替代 confirm）
         * @param {string} message - 提示内容
         * @param {string} title - 标题（可选）
         * @param {boolean} isDanger - 是否为危险操作（红色按钮）
         */
        function showConfirm(message, title = '请确认', isDanger = false) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('customDialog');
                const titleEl = document.getElementById('customDialogTitle');
                const contentEl = document.getElementById('customDialogContent');
                const buttonsEl = document.getElementById('customDialogButtons');

                // 设置标题
                titleEl.textContent = '❓ ' + title;
                titleEl.className = 'custom-dialog-title confirm';

                // 设置内容
                contentEl.textContent = message;

                // 设置按钮
                const confirmBtnClass = isDanger ? 'danger' : 'confirm';
                buttonsEl.innerHTML = `
                    <button class="custom-dialog-btn cancel" onclick="closeCustomDialog(false)">取消</button>
                    <button class="custom-dialog-btn ${confirmBtnClass}" onclick="closeCustomDialog(true)">确定</button>
                `;

                // 保存回调
                window.customDialogCallback = resolve;

                // 显示弹窗
                dialog.classList.add('show');
            });
        }

        /**
         * 关闭自定义弹窗
         * @param {boolean} result - 用户点击的结果
         */
        function closeCustomDialog(result) {
            const dialog = document.getElementById('customDialog');
            dialog.classList.remove('show');
            
            if (window.customDialogCallback) {
                window.customDialogCallback(result);
                window.customDialogCallback = null;
            }
        }

        // 点击遮罩关闭（仅用于 alert，confirm 必须点击按钮）
        document.getElementById('customDialog').addEventListener('click', function(e) {
            if (e.target === this) {
                // 如果是 confirm 弹窗，不关闭
                const buttons = document.getElementById('customDialogButtons');
                if (buttons.children.length === 1) {
                    closeCustomDialog(true);
                }
            }
        });

        // 检查登录状态
        const token = localStorage.getItem('poker_token');
        const user = JSON.parse(localStorage.getItem('poker_user') || '{}');
        let currentEditUserId = null;

        if (!token) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('username').textContent = user.nickname || user.username;
            document.getElementById('chips').textContent = user.chips || 0;
            
            // 设置头像
            const avatarFilename = user.avatar_filename || 'avatar1.png';
            const headerAvatarImg = document.getElementById('headerAvatarImg');
            if (headerAvatarImg) {
                headerAvatarImg.src = `/avatars/${avatarFilename}`;
            }
            
            // 如果是超管，显示后台管理按钮
            if (user.isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
            }
        }

        // 加载房间列表
        async function loadRooms() {
            try {
                const response = await fetch(`${API_BASE}/rooms/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('加载失败');
                }

                const rooms = await response.json();
                renderRooms(rooms);
            } catch (error) {
                console.error('Load rooms error:', error);
                document.getElementById('roomList').innerHTML = 
                    '<div class="empty-state">加载失败，请稍后重试</div>';
            }
        }

        // 渲染房间列表
        function renderRooms(rooms) {
            const container = document.getElementById('roomList');
            
            if (rooms.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无房间，创建一个吧！</div>';
                return;
            }

            container.innerHTML = rooms.map(room => {
                const isPlaying = room.status === 'playing';
                const isMyRoom = room.is_my_room === 1;
                const isHost = room.host_id === user.id;
                
                // 如果是进行中的游戏且玩家自己在里面
                if (isPlaying && isMyRoom) {
                    return `
                        <div class="room-item playing">
                            <div>
                                <div class="room-name">${escapeHtml(room.name)} ${room.password ? '🔒' : ''}</div>
                                <div style="color: #ffd700; font-size: 0.8rem;">🎮 你正在游戏中</div>
                            </div>
                            <div class="room-host">${escapeHtml(room.host_name)}</div>
                            <div>${room.small_blind}/${room.big_blind}</div>
                            <div>${room.player_count}/${room.max_players}</div>
                            <div style="color: #e74c3c;">游戏中</div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn-join" style="background: #27ae60;" onclick="reconnectGame('${room.id}')">
                                    重连
                                </button>
                                ${isHost ? `<button class="btn-delete" onclick="deleteRoom('${room.id}')">删除</button>` : ''}
                            </div>
                        </div>
                    `;
                }
                
                // 普通等待中的房间
                return `
                    <div class="room-item">
                        <div>
                            <div class="room-name">${escapeHtml(room.name)} ${room.password ? '🔒' : ''}</div>
                            ${isHost ? '<div style="color: #ffd700; font-size: 0.8rem;">👑 你是房主</div>' : ''}
                        </div>
                        <div class="room-host">${escapeHtml(room.host_name)}</div>
                        <div>${room.small_blind}/${room.big_blind}</div>
                        <div>${room.player_count}/${room.max_players}</div>
                        <div>${isPlaying ? '<span style="color: #e74c3c;">游戏中</span>' : '等待中'}</div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-join" 
                                onclick="joinRoom('${room.id}', ${room.password ? 'true' : 'false'})"
                                ${room.player_count >= room.max_players || isPlaying ? 'disabled' : ''}>
                                ${room.player_count >= room.max_players ? '已满' : isPlaying ? '游戏中' : '加入'}
                            </button>
                            ${isHost ? `<button class="btn-delete" onclick="deleteRoom('${room.id}')">删除</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 删除房间（房主专用）
        async function deleteRoom(roomId) {
            const confirmed = await showConfirm('确定要删除这个房间吗？房间内的所有玩家都会被踢出。', '删除房间', true);
            if (!confirmed) return;

            try {
                const response = await fetch(`${API_BASE}/rooms/${roomId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    await showAlert('房间已删除', 'success');
                    loadRooms();
                } else {
                    await showAlert(data.error || '删除失败', 'error');
                }
            } catch (error) {
                console.error('Delete room error:', error);
                await showAlert('网络错误', 'error');
            }
        }

        // 重连
        async function reconnectGame(roomId) {
            const confirmed = await showConfirm('你有一个正在进行的游戏，是否重连？', '重连');
            if (confirmed) {
                window.location.href = `game.html?id=${roomId}`;
            }
        }

        // 创建房间
        document.getElementById('createRoomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('roomName').value;
            const maxPlayers = parseInt(document.getElementById('maxPlayers').value);
            const blindSetting = document.getElementById('blindSetting').value.split(',');
            const hasPassword = document.getElementById('hasPassword').checked;
            const password = hasPassword ? document.getElementById('roomPassword').value : '';

            try {
                const response = await fetch(`${API_BASE}/rooms/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        name,
                        maxPlayers,
                        smallBlind: parseInt(blindSetting[0]),
                        bigBlind: parseInt(blindSetting[1]),
                        password: password || undefined
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // 跳转到房间页面
                    window.location.href = `room.html?id=${data.room.id}`;
                } else {
                    await showAlert(data.error || '创建失败', 'error');
                }
            } catch (error) {
                console.error('Create room error:', error);
                await showAlert('网络错误', 'error');
            }
        });

        // 加入房间
        async function joinRoom(roomId, needPassword) {
            currentRoomId = roomId;

            if (needPassword) {
                document.getElementById('joinModal').classList.add('show');
            } else {
                doJoinRoom(roomId, '');
            }
        }

        document.getElementById('joinRoomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('joinPassword').value;
            doJoinRoom(currentRoomId, password);
        });

        async function doJoinRoom(roomId, password) {
            try {
                const response = await fetch(`${API_BASE}/rooms/${roomId}/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = `room.html?id=${roomId}`;
                } else {
                    await showAlert(data.error || '加入失败', 'error');
                }
            } catch (error) {
                console.error('Join room error:', error);
                await showAlert('网络错误', 'error');
            }
        }

        // 显示/隐藏弹窗
        function showCreateModal() {
            document.getElementById('createModal').classList.add('show');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        function hideJoinModal() {
            document.getElementById('joinModal').classList.remove('show');
        }

        function togglePassword() {
            document.getElementById('passwordGroup').classList.toggle('show');
        }

        function refreshRooms() {
            loadRooms();
        }

        function logout() {
            localStorage.removeItem('poker_token');
            localStorage.removeItem('poker_user');
            localStorage.removeItem('is_guest');
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 个人信息功能 ====================
        
        // 显示个人信息弹窗
        function showProfileModal() {
            const localUser = JSON.parse(localStorage.getItem('poker_user') || '{}');
            document.getElementById('profileUsername').textContent = localUser.username || '-';
            document.getElementById('profileNickname').textContent = localUser.nickname || localUser.username || '-';
            document.getElementById('profileChips').textContent = localUser.chips || 0;
            
            const avatarFilename = localUser.avatar_filename || 'avatar1.png';
            const profileAvatarImg = document.getElementById('profileAvatarImg');
            if (profileAvatarImg) {
                profileAvatarImg.src = `/avatars/${avatarFilename}`;
            }

            document.getElementById('profileModal').classList.add('show');

            loadProfileInfo();

            document.getElementById('newNickname').value = '';
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            hideProfileMessage('nicknameMessage');
            hideProfileMessage('passwordMessage');
            hideProfileMessage('avatarMessage');

            initAvatarSelector(avatarFilename);
        }

        // 隐藏个人信息弹窗
        function hideProfileModal() {
            document.getElementById('profileModal').classList.remove('show');
        }

        // 加载个人信息
        async function loadProfileInfo() {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const userInfo = await response.json();
                document.getElementById('profileUsername').textContent = userInfo.username;
                document.getElementById('profileNickname').textContent = userInfo.nickname || userInfo.username;
                document.getElementById('profileChips').textContent = userInfo.chips || 0;

                const avatarFilename = userInfo.avatar_filename || 'avatar1.png';
                document.getElementById('profileAvatarImg').src = `/avatars/${avatarFilename}`;

                const localUser = JSON.parse(localStorage.getItem('poker_user') || '{}');
                localUser.avatar_filename = avatarFilename;
                localStorage.setItem('poker_user', JSON.stringify(localUser));
            } catch (error) {
                console.error('Load profile error:', error);
            }
        }

        // 显示消息
        function showProfileMessage(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'profile-message ' + (isSuccess ? 'success' : 'error');
            el.style.display = 'block';
        }

        // 隐藏消息
        function hideProfileMessage(elementId) {
            const el = document.getElementById(elementId);
            el.style.display = 'none';
        }

        // 修改昵称
        async function updateNickname() {
            const newNickname = document.getElementById('newNickname').value.trim();
            
            if (!newNickname) {
                showProfileMessage('nicknameMessage', '请输入新昵称', false);
                return;
            }

            if (newNickname.length > 20) {
                showProfileMessage('nicknameMessage', '昵称不能超过20个字符', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/update-nickname`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nickname: newNickname })
                });

                const data = await response.json();

                if (response.ok) {
                    showProfileMessage('nicknameMessage', '昵称修改成功！', true);
                    // 更新本地存储的用户信息
                    user.nickname = newNickname;
                    localStorage.setItem('poker_user', JSON.stringify(user));
                    // 更新页面显示
                    document.getElementById('username').textContent = newNickname;
                    document.getElementById('profileNickname').textContent = newNickname;
                    document.getElementById('newNickname').value = '';
                } else {
                    showProfileMessage('nicknameMessage', data.error || '修改失败', false);
                }
            } catch (error) {
                console.error('Update nickname error:', error);
                showProfileMessage('nicknameMessage', '网络错误', false);
            }
        }

        // 修改密码
        async function updatePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!currentPassword || !newPassword || !confirmPassword) {
                showProfileMessage('passwordMessage', '请填写所有密码字段', false);
                return;
            }

            if (newPassword.length < 6) {
                showProfileMessage('passwordMessage', '新密码长度至少6个字符', false);
                return;
            }

            if (newPassword !== confirmPassword) {
                showProfileMessage('passwordMessage', '两次输入的新密码不一致', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/update-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showProfileMessage('passwordMessage', '密码修改成功！请使用新密码重新登录', true);
                    // 清空密码输入框
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showProfileMessage('passwordMessage', data.error || '修改失败', false);
                }
            } catch (error) {
                console.error('Update password error:', error);
                showProfileMessage('passwordMessage', '网络错误', false);
            }
        }

        // 初始化头像选择器
        function initAvatarSelector(currentAvatarFilename) {
            const avatarGrid = document.getElementById('avatarGrid');
            avatarGrid.innerHTML = '';

            const avatars = [
                'avatar1.png', 'avatar2.png', 'avatar3.png', 'avatar4.png',
                'avatar5.png', 'avatar6.png', 'avatar7.png', 'avatar8.png',
                'avatar9.png', 'avatar10.png', 'avatar11.png', 'avatar12.png',
                'avatar13.png', 'avatar14.png', 'avatar15.png', 'avatar16.png',
                'avatar17.png', 'avatar18.png', 'avatar19.png', 'avatar20.png'
            ];

            avatars.forEach(avatarFilename => {
                const avatarOption = document.createElement('div');
                avatarOption.className = 'avatar-option';
                
                const img = document.createElement('img');
                img.src = `/avatars/${avatarFilename}`;
                img.alt = avatarFilename;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '50%';
                
                avatarOption.appendChild(img);
                avatarOption.onclick = () => selectAvatar(avatarFilename);
                
                if (avatarFilename === currentAvatarFilename) {
                    avatarOption.classList.add('selected');
                }
                
                avatarGrid.appendChild(avatarOption);
            });
        }

        // 选择头像
        function selectAvatar(avatarFilename) {
            document.querySelectorAll('.avatar-option').forEach(el => {
                el.classList.remove('selected');
            });
            event.target.closest('.avatar-option').classList.add('selected');
            event.target.closest('.avatar-option').dataset.selectedAvatar = avatarFilename;
        }

        // 修改头像
        async function updateAvatar() {
            const selectedAvatar = document.querySelector('.avatar-option.selected');
            
            if (!selectedAvatar) {
                showProfileMessage('avatarMessage', '请先选择一个头像', false);
                return;
            }

            const avatarFilename = selectedAvatar.dataset.selectedAvatar;
            console.log('[Update Avatar] Selected avatar:', avatarFilename);

            try {
                const response = await fetch(`${API_BASE}/auth/update-avatar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ avatarFilename })
                });

                console.log('[Update Avatar] Response status:', response.status);
                const data = await response.json();
                console.log('[Update Avatar] Response data:', data);

                if (response.ok) {
                    console.log('[Update Avatar] Updating UI...');
                    
                    try {
                        showProfileMessage('avatarMessage', '头像修改成功！', true);
                        
                        console.log('[Update Avatar] Updating profileAvatarImg...');
                        const profileAvatarImg = document.getElementById('profileAvatarImg');
                        if (!profileAvatarImg) {
                            console.error('[Update Avatar] Error: profileAvatarImg element not found');
                            throw new Error('profileAvatarImg element not found');
                        }
                        profileAvatarImg.src = `/avatars/${avatarFilename}`;
                        console.log('[Update Avatar] profileAvatarImg src updated');
                        
                        console.log('[Update Avatar] Getting localUser from localStorage...');
                        const localUser = JSON.parse(localStorage.getItem('poker_user') || '{}');
                        console.log('[Update Avatar] Current localUser:', localUser);
                        
                        localUser.avatar_filename = avatarFilename;
                        localStorage.setItem('poker_user', JSON.stringify(localUser));
                        console.log('[Update Avatar] Local storage updated');
                        
                        console.log('[Update Avatar] Getting username element...');
                        const usernameElement = document.getElementById('username');
                        if (!usernameElement) {
                            console.error('[Update Avatar] Error: username element not found');
                            throw new Error('username element not found');
                        }
                        usernameElement.textContent = localUser.nickname || localUser.username;
                        console.log('[Update Avatar] Username updated');
                        
                        console.log('[Update Avatar] UI update completed successfully');
                    } catch (uiError) {
                        console.error('[Update Avatar] UI update error:', uiError);
                        console.error('[Update Avatar] UI error message:', uiError.message);
                        console.error('[Update Avatar] UI error stack:', uiError.stack);
                        showProfileMessage('avatarMessage', '界面更新失败：' + uiError.message, false);
                    }
                } else {
                    console.error('[Update Avatar] Server error:', data.error);
                    showProfileMessage('avatarMessage', data.error || '修改失败', false);
                }
            } catch (error) {
                console.error('[Update Avatar] Error details:', error);
                console.error('[Update Avatar] Error message:', error.message);
                console.error('[Update Avatar] Error stack:', error.stack);
                showProfileMessage('avatarMessage', '网络错误', false);
            }
        }

        // ==================== 排行榜功能 ====================
        
        // 显示排行榜弹窗
        async function showLeaderboardModal() {
            document.getElementById('leaderboardModal').classList.add('show');
            await loadLeaderboard();
        }

        // 隐藏排行榜弹窗
        function hideLeaderboardModal() {
            document.getElementById('leaderboardModal').classList.remove('show');
        }

        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/auth/leaderboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const leaderboard = await response.json();
                renderLeaderboard(leaderboard);
            } catch (error) {
                console.error('Load leaderboard error:', error);
                document.getElementById('leaderboardList').innerHTML = 
                    '<div class="leaderboard-empty">加载失败，请稍后重试</div>';
            }
        }

        // 渲染排行榜
        function renderLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboardList');
            
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="leaderboard-empty">暂无数据</div>';
                return;
            }

            container.innerHTML = leaderboard.map((item, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                const isCurrentUser = item.is_current_user === 1;
                
                // 状态: offline | online | in_room | in_game
                const status = item.status || 'offline';
                
                // 前三名特殊名字样式
                const nameClass = rank === 1 ? 'rank-1-name' : rank === 2 ? 'rank-2-name' : rank === 3 ? 'rank-3-name' : '';
                
                // 状态显示映射
                const statusTextMap = {
                    offline: '离线',
                    online: '在线',
                    in_room: '房间中',
                    in_game: '游戏中'
                };
                const statusText = statusTextMap[status] || '离线';
                
                return `
                    <div class="leaderboard-item ${isCurrentUser ? 'current-user' : ''}">
                        <div class="leaderboard-left">
                            <div class="rank-number ${rankClass}">${rankIcon}</div>
                            <div class="leaderboard-avatar">
                                <img src="/avatars/${item.avatar_filename || 'avatar1.png'}" alt="头像">
                            </div>
                        </div>
                        <div class="leaderboard-user-info">
                            <div class="leaderboard-username ${nameClass}">${escapeHtml(item.nickname || item.username)} ${isCurrentUser ? '<span class="leaderboard-user-tag">👤 你</span>' : ''}</div>
                            <div class="leaderboard-status ${status}">
                                <span class="status-dot ${status}"></span>
                                ${statusText}
                            </div>
                        </div>
                        <div class="leaderboard-chips">⭐ ${item.chips || 0}</div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 后台管理功能 ====================
        
        // 显示后台管理弹窗
        async function showAdminModal() {
            document.getElementById('adminModal').classList.add('show');
            await loadAdminUserList();
        }

        // 隐藏后台管理弹窗
        function hideAdminModal() {
            document.getElementById('adminModal').classList.remove('show');
        }

        // 加载用户列表（超管用）
        async function loadAdminUserList() {
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const users = await response.json();
                renderAdminUserList(users);
            } catch (error) {
                console.error('Load admin users error:', error);
                document.getElementById('adminUserList').innerHTML = 
                    '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        // 渲染用户列表
        function renderAdminUserList(users) {
            const container = document.getElementById('adminUserList');
            
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无用户</div>';
                return;
            }

            container.innerHTML = users.map(u => {
                const isSelf = u.id === user.id;
                return `
                    <div class="user-item">
                        <div class="user-name">
                            ${escapeHtml(u.nickname || u.username)}
                            ${isSelf ? '<span style="color: #e74c3c;"> (你)</span>' : ''}
                        </div>
                        <div class="user-chips">⭐ ${u.chips || 0}</div>
                        <div style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">
                            ${new Date(u.created_at).toLocaleDateString()}
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-small btn-edit" onclick="showChipsModal(${u.id}, '${escapeHtml(u.nickname || u.username)}', ${u.chips || 0})" ${isSelf ? 'disabled' : ''}>
                                筹码
                            </button>
                            <button class="btn-small btn-delete-small" onclick="deleteUser(${u.id}, '${escapeHtml(u.nickname || u.username)}')" ${isSelf ? 'disabled' : ''}>
                                删除
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 显示修改筹码弹窗
        function showChipsModal(userId, nickname, currentChips) {
            currentEditUserId = userId;
            document.getElementById('chipsModalUserInfo').innerHTML = 
                `用户：<strong>${nickname}</strong> | 当前筹码：<span style="color: #ffd700;">${currentChips}</span>`;
            document.getElementById('chipsAmount').value = '';
            document.getElementById('chipsModal').classList.add('show');
        }

        // 隐藏修改筹码弹窗
        function hideChipsModal() {
            document.getElementById('chipsModal').classList.remove('show');
            currentEditUserId = null;
        }

        // 保存筹码修改
        async function saveChips() {
            if (!currentEditUserId) return;
            
            const operation = document.getElementById('chipsOperation').value;
            const amount = parseInt(document.getElementById('chipsAmount').value);
            
            if (isNaN(amount) || amount < 0) {
                await showAlert('请输入有效的金额', 'warning');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/admin/users/${currentEditUserId}/chips`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ operation, amount })
                });

                const data = await response.json();

                if (response.ok) {
                    await showAlert(`筹码修改成功！\n${data.user.username}: ${data.user.oldChips} → ${data.user.newChips}`, 'success');
                    hideChipsModal();
                    loadAdminUserList(); // 刷新列表
                } else {
                    await showAlert(data.error || '修改失败', 'error');
                }
            } catch (error) {
                console.error('Update chips error:', error);
                await showAlert('网络错误', 'error');
            }
        }

        // 删除用户
        async function deleteUser(userId, nickname) {
            const confirmed = await showConfirm(`确定要删除用户 "${nickname}" 吗？\n此操作不可恢复！`, '删除用户', true);
            if (!confirmed) return;

            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    await showAlert('用户已删除', 'success');
                    loadAdminUserList(); // 刷新列表
                } else {
                    await showAlert(data.error || '删除失败', 'error');
                }
            } catch (error) {
                console.error('Delete user error:', error);
                await showAlert('网络错误', 'error');
            }
        }

        // 清除所有房间
        async function clearAllRooms() {
            const confirmed = await showConfirm('⚠️ 警告！\n\n确定要清除所有房间吗？\n此操作会解散所有正在进行的游戏！\n\n此操作不可恢复！', '清除所有房间', true);
            if (!confirmed) return;

            try {
                const response = await fetch(`${API_BASE}/admin/rooms/all`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    await showAlert(`所有房间已清除！\n共删除 ${data.deletedCount} 个房间`, 'success');
                    loadRooms(); // 刷新房间列表
                } else {
                    await showAlert(data.error || '清除失败', 'error');
                }
            } catch (error) {
                console.error('Clear all rooms error:', error);
                await showAlert('网络错误', 'error');
            }
        }

        // 初始加载
        loadRooms();
        // 每5秒自动刷新
        setInterval(loadRooms, 5000);
    </script>
    
    <!-- Socket.io 连接（用于在线状态） -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 大厅页面 socket 连接（仅用于上报在线状态）
        const lobbySocket = io(window.location.origin);
        
        lobbySocket.on('connect', () => {
            console.log('Lobby socket connected:', lobbySocket.id);
            // 通知服务器用户在大厅上线
            lobbySocket.emit('user_online', { userId: user.id });
        });
        
        lobbySocket.on('disconnect', () => {
            console.log('Lobby socket disconnected');
        });
    </script>
</body>
